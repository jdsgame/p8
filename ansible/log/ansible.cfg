[defaults]
inventory = ./hosts.ini
local_tmp = $PWD/.ansible/tmp
forks = 10
gathering = explicit
host_key_checking = False
timeout = 30
strategy = free
bin_ansible_callbacks = True
nocows = 1

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
pipelining = True
scp_if_ssh = True
