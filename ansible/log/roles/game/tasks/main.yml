---
- name: "Check game directory"
  ansible.builtin.find:
    depth: 1
    file_type: directory
    paths: "{{ base_path }}"
    patterns: "^server[0-9]+$"
    use_regex: true
  register: game_dir
  ignore_errors: true

- name: "Check game log directory"
  ansible.builtin.stat:
    path: "{{ item.path }}/game/log"
  loop: "{{ game_dir.files | default([]) }}"
  register: log_dir_stat
  when: game_dir.matched | default(0) > 0

- ansible.builtin.include_role:
    name: clean
  when:
    - log_dir_stat.results is defined
    - log_dir_stat.results | length > 0
