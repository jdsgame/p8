---
- name: "Check gmserver directory"
  ansible.builtin.find:
    depth: 1
    file_type: directory
    paths: "{{ base_path }}"
    patterns: "^gmserver[0-9]+$"
    use_regex: true
  register: gm_dir
  ignore_errors: true

- name: "Check gmserver log directory"
  ansible.builtin.stat:
    path: "{{ item.path }}/log"
  loop: "{{ gm_dir.files | default([]) }}"
  register: log_dir_stat
  when: gm_dir.matched | default(0) > 0

- ansible.builtin.include_role:
    name: clean
  when:
    - log_dir_stat.results is defined
    - log_dir_stat.results | length > 0
