---
- name: "Check global directory"
  ansible.builtin.find:
    depth: 1
    file_type: directory
    paths: "{{ base_path }}"
    patterns: "^global[0-9]+$"
    use_regex: true
  register: global_dir
  ignore_errors: true

- name: "Check global log directory"
  ansible.builtin.stat:
    path: "{{ item.path }}/log"
  loop: "{{ global_dir.files | default([]) }}"
  register: log_dir_stat
  when: global_dir.matched | default(0) > 0

- ansible.builtin.include_role:
    name: clean
  when:
    - log_dir_stat.results is defined
    - log_dir_stat.results | length > 0
